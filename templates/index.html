<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adolar</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent:        #7F77DD;
      --accent-light:  #EEEDFE;
      --accent-border: #AFA9EC;
      --accent-dark:   #3C3489;
      --accent-deep:   #534AB7;

      --bg-primary:    #30302E;
      --bg-secondary:  #3A3A38;
      --bg-tertiary:   #1E1E1C;

      --text-primary:   #ECECEC;
      --text-secondary: #9A9A96;
      --text-tertiary:  #5C5C58;

      --border-subtle: #3E3E3C;
      --border-medium: #505050;

      --text-xs:   11px;
      --text-sm:   12px;
      --text-base: 13px;
      --text-md:   14px;
      --text-lg:   15px;

      --topbar-h:  52px;
      --sidebar-w: 220px;
      --player-h:  60px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Zentrierung + max-width */
    #topbar, #scan-banner, #body-row, #player-bar {
      width: 100%;
      max-width: 1200px;
    }
    #topbar, #scan-banner, #player-bar {
      align-self: center;
    }

    /* ── Topbar ─────────────────────────────────────────── */
    #topbar {
      height: var(--topbar-h);
      min-height: var(--topbar-h);
      background: var(--bg-primary);
      border-bottom: 0.5px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 10;
    }
    #topbar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-primary);
    }
    #topbar-logo img { border-radius: 4px; }
    #topbar-logo span {
      font-family: "Orbitron", sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, var(--accent) 0%, #b8b4f0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #topbar-meta {
      font-size: var(--text-sm);
      color: var(--text-tertiary);
    }

    /* ── Scan Banner ────────────────────────────────────── */
    #scan-banner {
      display: none;
      background: color-mix(in srgb, var(--accent) 15%, var(--bg-primary));
      border-bottom: 0.5px solid color-mix(in srgb, var(--accent) 40%, var(--border-subtle));
      padding: 7px 20px;
      font-size: var(--text-sm);
      color: var(--text-primary);
      align-items: center;
      gap: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #scan-spinner { display: inline-block; animation: spin 1.2s linear infinite; }

    /* ── Body row (sidebar + content) ───────────────────── */
    #body-row {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      flex: 0 0 var(--sidebar-w);
      background: var(--bg-primary);
      border-right: 0.5px solid var(--border-subtle);
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-sizing: border-box;
    }

    /* Slider-Zeile darf nicht über Sidebar-Breite hinausgehen */
    .slider-item {
      max-width: 100%;
    }
    .slider-item input[type=range] {
      min-width: 0;
    }
    .slider-val {
      flex-shrink: 0;
    }

    .filter-section {}
    .filter-label {
      display: block;
      font-size: var(--text-xs);
      font-weight: 500;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .chip-group {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      width: 100%;
    }
    .chip {
      font-size: var(--text-sm);
      padding: 3px 9px;
      border-radius: 99px;
      border: 0.5px solid var(--border-subtle);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background .1s, border-color .1s, color .1s;
      white-space: nowrap;
      min-width: 0;
    }
    .chip:hover { background: var(--bg-secondary); }
    .chip.active {
      background: var(--accent-light);
      border-color: var(--accent-border);
      color: var(--accent-dark);
    }

    /* Range sliders in sidebar */
    .slider-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 2px;
    }
    .slider-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .slider-item label {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      width: 28px;
      flex-shrink: 0;
    }
    .slider-item input[type=range] {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .slider-val {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      width: 38px;
      text-align: right;
      flex-shrink: 0;
    }

    .sidebar-scan {
      margin-top: auto;
      padding-top: 12px;
      border-top: 0.5px solid var(--border-subtle);
    }
    #btn-scan {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      padding: 6px 10px;
      background: transparent;
      border: 0.5px solid var(--border-medium);
      border-radius: 6px;
      font-size: var(--text-base);
      color: var(--text-secondary);
      cursor: pointer;
      transition: background .1s;
    }
    #btn-scan:hover { background: var(--bg-secondary); }

    /* ── Content area ─────────────────────────────────── */
    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Search Bar ───────────────────────────────────── */
    #search-bar {
      background: var(--bg-primary);
      border-bottom: 0.5px solid var(--border-subtle);
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .search-input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-subtle);
      border-radius: 8px;
      padding: 7px 12px;
    }
    .search-input-wrap i { font-size: 16px; color: var(--text-tertiary); }
    #search {
      flex: 1;
      border: none;
      background: transparent;
      font-size: var(--text-md);
      color: var(--text-primary);
      outline: none;
    }
    #search::placeholder { color: var(--text-tertiary); }
    #sort-select {
      border: 0.5px solid var(--border-subtle);
      border-radius: 8px;
      background: var(--bg-primary);
      color: var(--text-secondary);
      font-size: var(--text-base);
      padding: 7px 10px;
      cursor: pointer;
      outline: none;
    }
    #btn-radio {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border: 0.5px solid var(--border-subtle);
      border-radius: 8px;
      background: transparent;
      color: var(--text-secondary);
      font-size: var(--text-base);
      cursor: pointer;
      white-space: nowrap;
      transition: background .1s, color .1s, border-color .1s;
    }
    #btn-radio:hover { background: var(--bg-secondary); }
    #btn-radio.active {
      background: color-mix(in srgb, var(--accent) 15%, var(--bg-primary));
      border-color: var(--accent);
      color: var(--accent);
    }
    /* Last.fm heart */
    .btn-love {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      font-size: 16px;
      padding: 4px;
      line-height: 1;
      transition: color .15s, transform .15s;
      flex-shrink: 0;
    }
    .btn-love:hover { color: #e03e3e; transform: scale(1.15); }
    .btn-love.loved { color: #e03e3e; }
    #player-love {
      font-size: 20px;
      padding: 6px;
      flex-shrink: 0;
    }
    #lastfm-connect {
      background: none;
      border: 0.5px solid var(--border-subtle);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: var(--text-sm);
      padding: 5px 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #lastfm-connect:hover { background: var(--bg-secondary); }

    /* ── Results Header ───────────────────────────────── */
    #results-header {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 0.5px solid var(--border-subtle);
      background: var(--bg-primary);
    }
    #result-count {
      font-size: var(--text-base);
      color: var(--text-secondary);
    }
    #view-toggle {
      display: flex;
      border: 0.5px solid var(--border-subtle);
      border-radius: 6px;
      overflow: hidden;
    }
    .view-btn {
      padding: 5px 9px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      font-size: 16px;
      display: flex;
      align-items: center;
    }
    .view-btn.active {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    /* ── Track List ───────────────────────────────────── */
    #track-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 16px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      background: var(--bg-tertiary);
    }

    .track-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-primary);
      border: 0.5px solid var(--border-subtle);
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: border-color .12s;
    }
    .track-row:hover { border-color: var(--border-medium); }
    .track-row.active {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 18%, var(--bg-primary));
    }
    .track-row.active .track-title {
      color: var(--text-primary);
    }

    /* Cover */
    .track-cover {
      width: 42px;
      height: 42px;
      border-radius: 6px;
      flex-shrink: 0;
      object-fit: cover;
    }
    .track-cover-placeholder {
      width: 42px;
      height: 42px;
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }

    /* Track info */
    .track-info { flex: 1; min-width: 0; }
    .track-title {
      font-size: var(--text-md);
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-sub {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    /* Meta */
    .track-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }
    .format-badge {
      font-size: var(--text-xs);
      padding: 2px 7px;
      border-radius: 99px;
      background: var(--bg-secondary);
      color: var(--text-secondary);
    }
    .track-dur {
      font-size: var(--text-sm);
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
    }

    /* Inline play button */
    .track-play-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 0.5px solid var(--border-medium);
      background: transparent;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .1s, color .1s;
      font-size: 14px;
    }
    .track-play-btn:hover {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }
    .track-row.active .track-play-btn {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Pagination ───────────────────────────────────── */
    #pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      background: var(--bg-primary);
      border-top: 0.5px solid var(--border-subtle);
    }
    .pg-btn {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-subtle);
      color: var(--text-secondary);
      padding: 5px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: var(--text-base);
    }
    .pg-btn:disabled { opacity: .35; cursor: default; }
    #pg-info { font-size: var(--text-sm); color: var(--text-tertiary); }

    /* ── Basket ───────────────────────────────────────── */
    #btn-basket {
      background: none;
      border: 0.5px solid var(--border-medium);
      border-radius: 8px;
      color: var(--text-secondary);
      padding: 6px 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }
    #btn-basket.open {
      border-color: var(--accent);
      color: var(--accent);
    }
    #basket-count {
      display: none;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      border-radius: 99px;
      min-width: 18px;
      height: 18px;
      line-height: 18px;
      text-align: center;
      padding: 0 5px;
    }
    #basket-panel {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 320px;
      background: var(--bg-primary);
      border: 0.5px solid var(--border-medium);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
      z-index: 100;
      overflow: hidden;
      flex-direction: column;
    }
    #basket-panel.open { display: flex; }
    #basket-list {
      overflow-y: auto;
      max-height: 320px;
      padding: 6px 0;
    }
    .basket-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      font-size: 13px;
    }
    .basket-item:hover { background: var(--bg-secondary); }
    .basket-item-info { flex: 1; min-width: 0; }
    .basket-item-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-primary);
      font-size: 13px;
    }
    .basket-item-sub {
      font-size: 11px;
      color: var(--text-tertiary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .basket-remove {
      background: none;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 2px;
      border-radius: 4px;
      font-size: 16px;
      flex-shrink: 0;
    }
    .basket-remove:hover { color: var(--text-primary); background: var(--bg-secondary); }
    #basket-empty {
      padding: 24px;
      text-align: center;
      font-size: 13px;
      color: var(--text-tertiary);
      display: none;
    }
    #btn-basket-download {
      margin: 8px;
      padding: 9px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    #btn-basket-download:hover { background: var(--accent-deep); }
    #btn-basket-download:disabled { opacity: .5; cursor: default; }

    /* ── Player Bar ───────────────────────────────────── */
    #player-bar {
      height: var(--player-h);
      min-height: var(--player-h);
      background: var(--bg-primary);
      border-top: 0.5px solid var(--border-subtle);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
    }

    #player-cover-wrap {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      flex-shrink: 0;
      overflow: hidden;
    }
    #player-cover-wrap img,
    #player-cover-wrap .cover-placeholder {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 6px;
    }
    #player-cover-wrap .cover-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      background: var(--accent-deep);
    }

    #player-info { width: 140px; overflow: hidden; flex-shrink: 0; }
    #player-title {
      font-size: var(--text-base);
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #player-artist {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #player-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 4px;
      border-radius: 4px;
      color: var(--text-secondary);
      transition: color .1s;
    }
    .ctrl-btn:hover { color: var(--text-primary); }
    .ctrl-btn i { font-size: 18px; }
    #play-btn i  { font-size: 22px; color: var(--text-primary); }

    #progress-wrap {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .time-label {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    #progress {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
    }

    #volume-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    #volume-wrap i { font-size: 16px; color: var(--text-tertiary); }
    #volume { width: 70px; accent-color: var(--accent); cursor: pointer; }

    audio { display: none; }

    #btn-miniplayer {
      background: none;
      border: 0.5px solid var(--border-subtle);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: var(--text-sm);
      padding: 5px 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }
    #btn-miniplayer:hover { background: var(--bg-secondary); }

    /* ── Language Switch ─────────────────────────────────── */
    .lang-btn {
      background: none; border: none; cursor: pointer;
      font-size: 18px; padding: 2px 4px; border-radius: 4px;
      opacity: 0.4; transition: opacity .15s;
    }
    .lang-btn:hover { opacity: 0.8; }
    .lang-btn.active { opacity: 1; }

    /* ── Empty state ──────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 60px 20px;
      color: var(--text-tertiary);
      font-size: var(--text-base);
    }
    .empty-state i { font-size: 40px; }
  </style>
</head>
<body>

<!-- ── Topbar ── -->
<div id="topbar">
  <div id="topbar-logo">
    <img src="/static/logo.svg" width="28" height="28" alt="Adolar">
    <span>Adolar</span>
  </div>
  <div id="topbar-meta">Lade…</div>
  <div id="lastfm-status" style="flex-shrink:0;display:flex;align-items:center;gap:8px;font-size:var(--text-sm);color:var(--text-tertiary)"></div>
  <div id="lang-switch" style="display:flex;gap:4px;flex-shrink:0">
    <button class="lang-btn" id="lang-de" title="Deutsch" onclick="setLang('de')">🇩🇪</button>
    <button class="lang-btn" id="lang-en" title="English" onclick="setLang('en')">🇬🇧</button>
  </div>
  <button id="btn-miniplayer" title="Mini-Player abdocken">
    <i class="ti ti-player-eject" style="font-size:14px"></i> Mini
  </button>
  <div style="position:relative;flex-shrink:0">
    <button id="btn-basket" title="Download-Korb">
      <i class="ti ti-shopping-cart-down" style="font-size:17px"></i>
      <span id="basket-label">Korb</span>
      <span id="basket-count">0</span>
    </button>
    <div id="basket-panel">
      <div id="basket-list"></div>
      <div id="basket-empty">Korb ist leer</div>
      <button id="btn-basket-download">
        <i class="ti ti-device-floppy"></i> Als ZIP herunterladen
      </button>
    </div>
  </div>
</div>

<!-- ── Scan Banner ── -->
<div id="scan-banner">
  <i class="ti ti-refresh" id="scan-spinner" aria-hidden="true"></i>
  <span id="scan-banner-text">Bibliothek wird gescannt…</span>
</div>

<!-- ── Body ── -->
<div id="body-row">

  <!-- Sidebar -->
  <aside id="sidebar">

    <div class="filter-section">
      <span class="filter-label" data-i18n="artist">Interpret</span>

// ── State ─────────────────────────────────────────────────
const basket = new Set();

// basketTracks: Map id → track-Objekt für Panel-Anzeige
const basketTracks = new Map();

function updateBasketUI() {
  const count = basket.size;
  const badge = $("basket-count");
  const btn   = $("btn-basket");
  badge.style.display = count > 0 ? "inline-block" : "none";
  badge.textContent   = count;
  btn.classList.toggle("open", btn.classList.contains("open") && count > 0);
  renderBasketPanel();
}

function renderBasketPanel() {
  const list  = $("basket-list");
  const empty = $("basket-empty");
  const dlBtn = $("btn-basket-download");
  list.innerHTML = "";

  if (basket.size === 0) {
    empty.style.display = "block";
    dlBtn.style.display = "none";
    return;
  }
  empty.style.display = "none";
  dlBtn.style.display = "flex";

  basket.forEach(id => {
    const t = basketTracks.get(id);
    if (!t) return;
    const item = document.createElement("div");
    item.className = "basket-item";
    item.innerHTML = `
      <div class="basket-item-info">
        <div class="basket-item-title">${esc(t.title || "—")}</div>
        <div class="basket-item-sub">${esc(t.artist || "")}${t.year ? " · " + t.year : ""}</div>
      </div>
      <button class="basket-remove" title="${LANG[lang].basket_remove}"><i class="ti ti-x"></i></button>`;
    item.querySelector(".basket-remove").onclick = () => {
      basket.delete(id);
      basketTracks.delete(id);
      updateBasketUI();
      renderTracks();
    };
    list.appendChild(item);
  });
}

$("btn-basket").onclick = () => {
  const panel = $("basket-panel");
  const btn   = $("btn-basket");
  const open  = panel.classList.toggle("open");
  btn.classList.toggle("open", open);
};

// Klick außerhalb schließt Panel
document.addEventListener("click", e => {
  if (!$("btn-basket").closest("div").contains(e.target)) {
    $("basket-panel").classList.remove("open");
    $("btn-basket").classList.remove("open");
  }
});

$("btn-basket-download").onclick = async () => {
  const dlBtn = $("btn-basket-download");
  dlBtn.disabled = true;
  dlBtn.innerHTML = `<i class="ti ti-loader" style="animation:spin 1s linear infinite"></i> ${t().basket_packing}`;
  try {
    const res = await fetch(`${API}/api/download`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ids: [...basket] }),
    });
    if (!res.ok) throw new Error("Fehler");
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = "adolar.zip"; a.click();
    URL.revokeObjectURL(url);
    basket.clear();
    basketTracks.clear();
    updateBasketUI();
    renderTracks();
    $("basket-panel").classList.remove("open");
    $("btn-basket").classList.remove("open");
  } catch {
    alert(t().basket_error);
  } finally {
    dlBtn.disabled = false;
    dlBtn.innerHTML = `<i class="ti ti-device-floppy"></i> ${t().basket_download}`;
  }
};

const DEMO_TRACKS = [
  { id:1, title:"Get Lucky", artist:"Daft Punk", album:"Random Access Memories", year:2013, genre:"Electronic", duration:369, duration_fmt:"6:09", format:"FLAC", has_cover:false, cover_hash:null },
  { id:2, title:"Bohemian Rhapsody", artist:"Queen", album:"A Night at the Opera", year:1975, genre:"Rock", duration:355, duration_fmt:"5:55", format:"MP3", has_cover:false, cover_hash:null },
  { id:3, title:"Alright", artist:"Kendrick Lamar", album:"To Pimp a Butterfly", year:2015, genre:"Hip-Hop", duration:219, duration_fmt:"3:39", format:"FLAC", has_cover:false, cover_hash:null },

const state = {
  tracks: [],

  page: 1,
  pages: 1,
  currentIdx: -1,
  currentTrack: null,

  sort: "artist",
  filters: {
    genre: "", decade: "", format: "",

    min_bitrate: 0,
    year_min: 0, year_max: 0,

};

// ── DOM ───────────────────────────────────────────────────
const audio      = $("audio");
const audioB     = $("audio-b");

const progress   = $("progress");

// ── Radio state ───────────────────────────────────────────
const radio = { active: false, queue: [], playedIds: [], cfTimer: null, cfActive: false };
const CF_PRELOAD = 25; // seconds before end: start buffering next track
const CF_OUT     = 12; // seconds before end: start fade-out
const CF_IN      =  8; // fade-in duration

// ── Helpers ───────────────────────────────────────────────
function fmt(sec) {
  if (!sec || isNaN(sec)) return "0:00";
  const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, "0")}`;
}

function esc(s) {
  return String(s ?? "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function initials(name) {
  if (!name) return "♪";
  return name.trim().split(/\s+/).slice(0,2).map(w => w[0].toUpperCase()).join("");
}

function artistColor(name) {
  let h = 0;
  for (const c of (name || "?")) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return `hsl(${h % 360}, 55%, 40%)`;
}

function makePlaceholder(track, size) {
  const div = document.createElement("div");
  div.className = "track-cover-placeholder";
  div.style.cssText = `width:${size}px;height:${size}px;background:${artistColor(track.artist)}`;
  div.textContent = initials(track.artist);
  return div;
}

function makeCover(track, size = 42) {
  if (track.has_cover) {
    const img = document.createElement("img");
    img.className = "track-cover";
    img.src = `${API}/api/cover/${track.cover_hash}`;
    img.loading = "lazy";
    img.width = size; img.height = size;
    img.onerror = () => img.replaceWith(makePlaceholder(track, size));
    return img;
  }
  return makePlaceholder(track, size);
}

// ── Fetch ─────────────────────────────────────────────────
async function loadTracks(page = 1) {
  if (radio.active) return;
  state.page = page;
  const p = new URLSearchParams({ page, per_page: 50, sort: state.sort });
  if (state.query)              p.set("q", state.query);
  if (state.filters.genre)      p.set("genre",   state.filters.genre);
  if (state.filters.decade)     p.set("decade",  state.filters.decade);
  if (state.filters.format)     p.set("format",  state.filters.format);
  if (state.filters.min_dur > 0)     p.set("min_dur",     state.filters.min_dur);
  if (state.filters.max_dur > 0)     p.set("max_dur",     state.filters.max_dur);
  if (state.filters.min_bitrate > 0) p.set("min_bitrate", state.filters.min_bitrate);
  if (state.filters.year_min > 0)    p.set("year_min",    state.filters.year_min);
  if (state.filters.year_max > 0)    p.set("year_max",    state.filters.year_max);
  if (state.filters.artist_letter)   p.set("artist_letter", state.filters.artist_letter);
  if (state.filters.title_letter)    p.set("title_letter",  state.filters.title_letter);

  let data;
  try {
    const res = await fetch(`${API}/api/search?${p}`);
    data = await res.json();
  } catch {
    data = { results: DEMO_TRACKS, total: DEMO_TRACKS.length, pages: 1 };
  }
  if (!data.results?.length && page === 1 && !state.query && !Object.values(state.filters).some(Boolean)) {
    data = { results: DEMO_TRACKS, total: DEMO_TRACKS.length, pages: 1 };
  }

  state.tracks = data.results;
  state.total  = data.total;
  state.pages  = data.pages;

  renderTracks();
  renderPagination();

  const q = state.query;
  $("result-count").textContent = q
    ? t().results_q(data.total, esc(q))
    : t().results(data.total);
}

// ── Render Tracks ─────────────────────────────────────────
function renderTracks() {
  const list = $("track-list");
  list.innerHTML = "";

  if (!state.tracks.length) {
    list.innerHTML = `<div class="empty-state"><i class="ti ti-music-off"></i>${t().no_tracks}</div>`;
    return;
  }

  state.tracks.forEach((t, i) => {
    const row = document.createElement("div");
    row.className = "track-row" + (state.currentTrack?.id === t.id ? " active" : "");
    row.dataset.idx = i;

    // Cover
    row.appendChild(makeCover(t, 42));

    // Info
    const info = document.createElement("div");
    info.className = "track-info";
    const sub = [t.artist, t.album, t.year].filter(Boolean).join(" · ");
    info.innerHTML = `<div class="track-title">${esc(t.title || t.path?.split(/[\\/]/).pop() || "—")}</div>
                      <div class="track-sub">${esc(sub)}</div>`;
    row.appendChild(info);

    // Meta
    const meta = document.createElement("div");
    meta.className = "track-meta";
    meta.innerHTML = `<span class="format-badge">${esc(t.format)}</span>
                      <span class="track-dur">${t.duration_fmt || fmt(t.duration)}</span>`;
    row.appendChild(meta);

    // Play button
    const playBtn = document.createElement("button");
    playBtn.className = "track-play-btn";
    playBtn.title = t().play;
    const isPlaying = state.currentTrack?.id === t.id && !audio.paused;
    playBtn.innerHTML = isPlaying
      ? `<i class="ti ti-player-pause"></i>`
      : `<i class="ti ti-player-play"></i>`;
    playBtn.addEventListener("click", e => {
      e.stopPropagation();
      if (state.currentTrack?.id === t.id) {
        audio.paused ? audio.play() : audio.pause();
      } else {
        playTrack(i);
      }
    });
    row.appendChild(playBtn);

    // Download-Button
    const dlBtn = document.createElement("button");
    dlBtn.className = "track-play-btn";
    dlBtn.title = basket.has(t.id) ? t().basket_rm : t().basket_add;
    dlBtn.innerHTML = basket.has(t.id)
      ? `<i class="ti ti-shopping-cart-off" style="color:var(--accent)"></i>`
      : `<i class="ti ti-download"></i>`;
    dlBtn.addEventListener("click", e => {
      e.stopPropagation();
      if (basket.has(t.id)) {
        basket.delete(t.id);
        basketTracks.delete(t.id);
      } else {
        basket.add(t.id);
        basketTracks.set(t.id, t);
      }
      updateBasketUI();
      renderTracks();
    });
    row.appendChild(dlBtn);

    // Love button (Last.fm)
    if (lfm.connected) {
      const loveBtn = document.createElement("button");
      const loveKey = `${t.artist}||${t.title}`;
      const isLoved = lfm.lovedCache.get(loveKey) || false;
      loveBtn.className = "btn-love" + (isLoved ? " loved" : "");
      loveBtn.dataset.key = loveKey;
      loveBtn.title = isLoved ? t().lfm_unlove : t().lfm_love;
      loveBtn.innerHTML = isLoved
        ? `<i class="ti ti-heart-filled"></i>`
        : `<i class="ti ti-heart"></i>`;
      loveBtn.addEventListener("click", e => {
        e.stopPropagation();
        lfmToggleLove(t, loveBtn);
      });
      row.appendChild(loveBtn);
      // lazy-load loved status if not cached
      if (!lfm.lovedCache.has(loveKey)) {
        lfmCheckLoved(t).then(loved => {
          lfm.lovedCache.set(loveKey, loved);
          applyLovedState(loveBtn, loved);
        });
      }
    }

    row.addEventListener("click", () => playTrack(i));
    list.appendChild(row);
  });
}

// ── Scrolling tab title ────────────────────────────────────
let _titleTimer = null;

function startTitleScroll(text) {
  if (_titleTimer) { clearInterval(_titleTimer); _titleTimer = null; }
  if (!text) { document.title = "Adolar"; return; }

  const full   = `${text}   ·   `;  // separator between repetitions
  const STATIC = 5000;   // ms to hold before scrolling
  const STEP   = 150;    // ms per character step
  let pos = 0;
  let phase = "static"; // "static" | "scroll" | "pause"
  let elapsed = 0;

  document.title = text;

  _titleTimer = setInterval(() => {
    if (phase === "static") {
      elapsed += STEP;
      if (elapsed >= STATIC) { phase = "scroll"; elapsed = 0; pos = 0; }
    } else if (phase === "scroll") {
      pos = (pos + 1) % full.length;
      const display = (full + full).slice(pos, pos + text.length);
      document.title = display;
      if (pos === 0) { phase = "pause"; elapsed = 0; document.title = text; }
    } else {
      elapsed += STEP;
      if (elapsed >= STATIC) { phase = "scroll"; elapsed = 0; pos = 0; }
    }
  }, STEP);
}

// ── Player ─────────────────────────────────────────────────
function updatePlayerUI(t) {
  $("player-title").textContent  = t.title  || "—";
  $("player-artist").textContent = t.artist || "";
  startTitleScroll(t.title && t.artist
    ? `${t.title} – ${t.artist}${t.year ? " (" + t.year + ")" : ""}`
    : null);

  const wrap = $("player-cover-wrap");

    fetch(`${API}/api/lastfm/nowplaying`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ artist: t.artist, title: t.title, duration: t.duration }),
    }).catch(() => {});
  }
}

function playTrack(idx) {
  const t = state.tracks[idx];
  if (!t) return;
  state.currentIdx   = idx;
  state.currentTrack = t;
  _scrobbled   = false;
  _playCounted = false;

  updatePlayerUI(t);
  audio.src = `${API}/api/stream/${t.id}`;
  audio.play();
  renderTracks();
}

// ── Radio functions ───────────────────────────────────────
async function loadRadioQueue(count, excludeIds = []) {
  const p = new URLSearchParams({ count });
  excludeIds.forEach(id => p.append("exclude", id));
  try {
    const res = await fetch(`${API}/api/random?${p}`);
    return await res.json();
  } catch { return []; }
}

async function startRadio() {
  radio.active = true;
  radio.queue  = [];
  radio.playedIds = [];
  $("btn-radio").classList.add("active");

  // Fetch 5 tracks first → play immediately, then fetch remaining in background
  const initial = await loadRadioQueue(5);
  if (!initial.length) { stopRadio(); return; }

  radio.queue   = initial;
  radio.session = (radio.session || 0) + 1; // session token prevents stale fills
  state.tracks  = [...radio.queue];
  $("result-count").textContent = t().radio_loading;
  playTrack(0);

  // Background fill to 25 — guarded by session token
  const mySession = radio.session;
  loadRadioQueue(20, initial.map(t => t.id)).then(more => {
    if (!radio.active || radio.session !== mySession) return;
    radio.queue.push(...more);
    state.tracks = [...radio.queue];
    $("result-count").textContent = t().radio_tracks(radio.queue.length);
    renderTracks();
  });
}

function stopRadio() {
  radio.active = false;
  radio.cfActive = false;
  clearTimeout(radio.cfTimer);
  audioB.pause(); audioB.removeAttribute("src"); audioB.load();
  $("btn-radio").classList.remove("active");
}

async function radioNext() {
  if (!radio.active || !radio.queue.length) return;

  // shift played track out
  const done = radio.queue.shift();
  radio.playedIds.push(done.id);

  // refill: when queue drops to 5, load 20 more
  if (radio.queue.length <= 5) {
    const fresh = await loadRadioQueue(20, radio.playedIds.slice(-100));
    radio.queue.push(...fresh);
    // trim playedIds to last 100 to avoid unbounded growth
    if (radio.playedIds.length > 100) radio.playedIds = radio.playedIds.slice(-100);
  }

  if (!radio.queue.length) { stopRadio(); return; }

  state.tracks = [...radio.queue];
  state.currentIdx = 0;
  state.currentTrack = radio.queue[0];
  renderTracks();
  $("result-count").textContent = `Radio – ${radio.queue.length} Tracks`;
}

function preloadNext(nextTrackId) {
  // Buffer the next track silently so it's ready when crossfade starts
  if (audioB.getAttribute("src")) return; // already preloading
  audioB.src = `${API}/api/stream/${nextTrackId}`;
  audioB.volume = 0;
  audioB.preload = "auto";
  audioB.load();
}

function startCrossfade() {
  if (radio.cfActive) return;
  // Wait until audioB has enough data to play without interruption
  if (audioB.readyState < 3) { // HAVE_FUTURE_DATA = 3
    audioB.addEventListener("canplay", startCrossfade, { once: true });
    return;
  }
  radio.cfActive = true;
  const vol = parseFloat($("volume").value) || 0.8;

  audioB.volume = 0;
  audioB.play().catch(() => {
    // Autoplay blocked or src invalid — fall back to direct next
    radio.cfActive = false;
    radioNext().then(() => { if (radio.queue.length) playTrack(0); });
  });

  const startTime = performance.now();
  const tick = () => {
    const elapsed = (performance.now() - startTime) / 1000;
    const t_out = Math.min(elapsed / CF_OUT, 1);
    const t_in  = Math.min(Math.max(elapsed - (CF_OUT - CF_IN), 0) / CF_IN, 1);
    // Equal-power curve: constant perceived loudness
    audio.volume  = vol * Math.cos(t_out * Math.PI / 2);
    audioB.volume = vol * Math.sin(t_in  * Math.PI / 2);

    if (elapsed < CF_OUT) {
      radio.cfTimer = setTimeout(tick, 50);
    } else {
      const nextSrc  = audioB.src;
      const nextTime = audioB.currentTime;
      audioB.pause(); audioB.removeAttribute("src"); audioB.load();
      radio.cfActive = false;
      radioNext().then(() => {
        if (!radio.queue.length) return;
        _scrobbled = false;
        updatePlayerUI(radio.queue[0]);
        audio.src = nextSrc;
        audio.currentTime = nextTime;
        audio.volume = vol;
        audio.play();
        renderTracks();
      });
    }
  };
  tick();
}

// ── Player events ─────────────────────────────────────────
playBtn.onclick = () => audio.paused ? audio.play() : audio.pause();

audio.onplay  = () => {
  playBtn.innerHTML = `<i class="ti ti-player-pause"></i>`;
  renderTracks();
};
audio.onpause = () => {
  playBtn.innerHTML = `<i class="ti ti-player-play"></i>`;
  renderTracks();
};
audio.onended = async () => {
  if (radio.active) {
    if (radio.cfActive) return; // crossfade already handles the transition
    await radioNext();
    if (radio.queue.length) playTrack(0);
  } else {
    const next = state.currentIdx + 1;
    if (next < state.tracks.length) playTrack(next);
  }
};

let _scrobbled = false;
let _playCounted = false;
audio.ontimeupdate = () => {
  if (!audio.duration) return;
  progress.value = (audio.currentTime / audio.duration) * 100;
  $("time-cur").textContent = fmt(audio.currentTime);
  $("time-dur").textContent = fmt(audio.duration);

  // Scrobble after 50% playback (and at least 30s played)
  if (!_scrobbled && audio.currentTime >= 30 && audio.currentTime / audio.duration >= 0.5) {
    _scrobbled = true;
    lfmScrobble(state.currentTrack);
  }

  // Increment play count tag at 90% played
  if (!_playCounted && audio.currentTime / audio.duration >= 0.9) {
    _playCounted = true;
    if (state.currentTrack) {
      fetch(`${API}/api/track/${state.currentTrack.id}/played`, { method: "POST" })
        .catch(() => {});
    }
  }

  if (radio.active) {
    const remaining = audio.duration - audio.currentTime;
    const next = radio.queue[1];
    if (next) {
      // Preload next track early so it's buffered before crossfade
      if (!radio.cfActive && remaining <= CF_PRELOAD) preloadNext(next.id);
      // Start crossfade
      if (!radio.cfActive && remaining <= CF_OUT) startCrossfade();
    }
  }
};

progress.oninput = () => {
  if (audio.duration) audio.currentTime = (progress.value / 100) * audio.duration;
};
$("volume").oninput = e => {
  audio.volume = e.target.value;
  if (!audioB.paused) audioB.volume = e.target.value;
};
audio.volume = 0.8;

$("btn-prev").onclick = () => {
  if (radio.active) return;
  if (state.currentIdx > 0) playTrack(state.currentIdx - 1);
};
$("btn-next").onclick = () => {
  if (radio.active) {
    clearTimeout(radio.cfTimer);
    radio.cfActive = false;
    audioB.pause(); audioB.removeAttribute("src"); audioB.load();
    audio.volume = parseFloat($("volume").value) || 0.8;
    radioNext().then(() => {
      if (radio.queue.length) playTrack(0);
    });
    return;
  }
  const next = state.currentIdx + 1;
  if (next < state.tracks.length) playTrack(next);
};

$("btn-radio").onclick = () => {
  if (radio.active) {
    stopRadio();
    loadTracks(1);
  } else {
    startRadio();
  }
};

// ── Mini-Player Popup ─────────────────────────────────────
const miniCh = new BroadcastChannel("adolar-player");
let miniWin = null;

function miniIsOpen() {
  return miniWin && !miniWin.closed;
}

function broadcastTrack(t) {
  if (!miniIsOpen()) return;
  const key = t ? `${t.artist}||${t.title}` : null;
  const loved = key ? (lfm.lovedCache.get(key) || false) : false;
  miniCh.postMessage({ type: "track", track: t, playing: !audio.paused, loved, lfmConnected: lfm.connected });
}

function broadcastPlayState() {
  if (!miniIsOpen()) return;
  miniCh.postMessage({ type: "playstate", playing: !audio.paused });
}

function broadcastLoved(loved) {
  if (!miniIsOpen()) return;
  miniCh.postMessage({ type: "loved", loved });
}

function broadcastProgress() {
  if (!miniIsOpen() || !audio.duration) return;
  miniCh.postMessage({ type: "progress", pct: (audio.currentTime / audio.duration) * 100, cur: audio.currentTime, dur: audio.duration });
}

audio.addEventListener("play",  broadcastPlayState);
audio.addEventListener("pause", broadcastPlayState);
audio.addEventListener("timeupdate", broadcastProgress);

// Commands from popup
miniCh.onmessage = e => {
  const msg = e.data;
  if (msg.type === "hello") {
    // Popup just opened — send current state
    if (state.currentTrack) broadcastTrack(state.currentTrack);
    else miniCh.postMessage({ type: "playstate", playing: false });
    miniCh.postMessage({ type: "lfm", connected: lfm.connected });
    return;
  }
  if (msg.type === "popup-closed") { miniWin = null; return; }
  if (msg.type !== "cmd") return;
  if (msg.cmd === "toggle")  audio.paused ? audio.play() : audio.pause();
  if (msg.cmd === "next")    $("btn-next").click();
  if (msg.cmd === "prev")    $("btn-prev").click();
  if (msg.cmd === "love")    lfmToggleLove(state.currentTrack, $("player-love"));
  if (msg.cmd === "seek" && audio.duration) audio.currentTime = (msg.value / 100) * audio.duration;
};

$("btn-miniplayer").onclick = () => {
  if (miniIsOpen()) { miniWin.focus(); return; }
  miniWin = window.open("/miniplayer", "adolar-mini",
    "width=320,height=200,resizable=no,toolbar=no,menubar=no,location=no,status=no");
};

function updateMiniPlayer(t) {
  broadcastTrack(t);
}

// ── Last.fm ────────────────────────────────────────────────
const lfm = { connected: false, username: null, lovedCache: new Map() };

async function lfmInit() {
  try {
    const res = await fetch(`${API}/api/lastfm/status`);
    const data = await res.json();
    lfm.connected = data.connected;
    lfm.username  = data.username;
  } catch { lfm.connected = false; }
  renderLfmStatus();
}

function renderLfmStatus() {
  const el = $("lastfm-status");
  if (!el) return;
  if (lfm.connected) {
    el.innerHTML = `
      <img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/lastdotfm.svg"
           width="14" height="14" style="filter:invert(.5) sepia(1) saturate(3) hue-rotate(310deg);opacity:.8">
      <span>${esc(lfm.username)}</span>
      <button id="lastfm-connect" onclick="lfmDisconnect()" title="${t().lfm_disconnect}">✕</button>`;
    $("player-love").style.display = "";
  } else {
    el.innerHTML = `
      <button id="lastfm-connect" onclick="location.href='/api/lastfm/auth'">
        <img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/lastdotfm.svg"
             width="13" height="13" style="filter:invert(.5) sepia(1) saturate(3) hue-rotate(310deg)">
        ${t().lfm_connect}
      </button>`;
    $("player-love").style.display = "none";
  }
}

async function lfmDisconnect() {
  await fetch(`${API}/api/lastfm/disconnect`, { method: "POST" });
  lfm.connected = false; lfm.username = null;
  lfm.lovedCache.clear();
  miniCh.postMessage({ type: "lfm", connected: false, loved: false });
  renderLfmStatus();
  renderTracks();
}

async function lfmScrobble(track) {
  if (!lfm.connected || !track) return;
  fetch(`${API}/api/lastfm/scrobble`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ artist: track.artist, title: track.title }),
  }).catch(() => {});
}

async function lfmCheckLoved(track) {
  if (!lfm.connected || !track) return false;
  const key = `${track.artist}||${track.title}`;
  if (lfm.lovedCache.has(key)) return lfm.lovedCache.get(key);
  try {
    const p = new URLSearchParams({ artist: track.artist || "", title: track.title || "" });
    const res = await fetch(`${API}/api/lastfm/loved?${p}`);
    const data = await res.json();
    lfm.lovedCache.set(key, data.loved);
    return data.loved;
  } catch { return false; }
}

async function lfmToggleLove(track, btn) {
  if (!lfm.connected || !track) return;
  const key    = `${track.artist}||${track.title}`;
  const isLoved = lfm.lovedCache.get(key) || false;
  const action  = isLoved ? "unlove" : "love";
  try {
    await fetch(`${API}/api/lastfm/love`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ artist: track.artist, title: track.title, action }),
    });
    lfm.lovedCache.set(key, !isLoved);
    applyLovedState(btn, !isLoved);
    broadcastLoved(!isLoved);
    // update all matching heart buttons in track list
    document.querySelectorAll(`.btn-love[data-key="${CSS.escape(key)}"]`).forEach(b => applyLovedState(b, !isLoved));
  } catch (e) { console.error("Last.fm love failed", e); }
}

function applyLovedState(btn, loved) {
  if (!btn) return;
  btn.classList.toggle("loved", loved);
  btn.title = loved ? t().lfm_unlove : t().lfm_love;
  btn.innerHTML = loved
    ? `<i class="ti ti-heart-filled"></i>`
    : `<i class="ti ti-heart"></i>`;
}

// Player love button
$("player-love").onclick = () => lfmToggleLove(state.currentTrack, $("player-love"));

const ALPHA_BUTTONS = [
  ..."ABCDEFGHIJKLMNOPQRSTUVWXYZ".split(""),
  "0–9", "#"
];

function buildAlphaChips(innerId) {
  const inner = $(innerId);
  inner.innerHTML = "";
  ALPHA_BUTTONS.forEach(val => {
    const btn = document.createElement("button");
    btn.className = "chip";
    btn.dataset.val = val;
    btn.textContent = val;
    inner.appendChild(btn);
  });
}

function setupAlphaFilter(alleId, listId, innerId, filterKey) {
  buildAlphaChips(innerId);

  $(alleId).onclick = () => {
    const list   = $(listId);
    const isOpen = list.style.display !== "none";
    if (isOpen) {
      list.style.display = "none";
      $(innerId).querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
      $(alleId).classList.add("active");
      state.filters[filterKey] = "";
      loadTracks(1);
    } else {
      list.style.display = "block";
      $(alleId).classList.remove("active");

  $(innerId).addEventListener("click", e => {
    const chip = e.target.closest(".chip");
    if (!chip) return;
    $(innerId).querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    state.filters[filterKey] = chip.dataset.val;
    loadTracks(1);
  });
}

  state.filters.year_max = v >= YEAR_MAX ? 0 : v;
  $("sl-year-max-val").textContent = v >= YEAR_MAX ? "–" : v;
  if (+$("sl-year-min").value > v) { $("sl-year-min").value = v; $("sl-year-min").oninput(); }
  loadTracks(1);
};

// ── Search & Sort ──────────────────────────────────────────
let searchTimer;
$("search").oninput = e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { state.query = e.target.value.trim(); loadTracks(1); }, 300);
};
$("sort-select").onchange = e => { state.sort = e.target.value; loadTracks(1); };

// ── Stats ──────────────────────────────────────────────────
async function loadStats() {
  try {
    const res  = await fetch(`${API}/api/stats`);
    const data = await res.json();
    const lastScan = data.last_scan
      ? new Date(data.last_scan * 1000).toLocaleDateString("de-DE")
      : "noch nie";
    $("topbar-meta").textContent =
      `${data.total_tracks.toLocaleString()} Tracks · ${data.total_size_gb} GB · Zuletzt gescannt: ${lastScan}`;
  } catch {}
}

// ── Genres ─────────────────────────────────────────────────
async function loadGenres() {
  try {
    const res    = await fetch(`${API}/api/genres`);
    const genres = await res.json();
    const inner  = $("chips-genre-inner");
    inner.innerHTML = "";
    genres.forEach(g => {
      const btn = document.createElement("button");
      btn.className = "chip";
      btn.dataset.val = g;
      btn.textContent = g;
      inner.appendChild(btn);
    });
  } catch {}
}

// ── Scanner ─────────────────────────────────────────────────
$("btn-scan").onclick = async () => {
  await fetch(`${API}/api/scan/start`, { method: "POST" });
  showBanner("Bibliothek wird gescannt…");
  startScanPolling();
};

function showBanner(text) {
  $("scan-banner").style.display = "flex";
  $("scan-banner-text").textContent = text;
}
function hideBanner() {
  $("scan-banner").style.display = "none";
}

let scanPoller = null;
let _missedFinish = 0;

async function checkScanOnce() {
  try {
    const res  = await fetch(`${API}/api/scan/status`);
    const data = await res.json();
    if (data.running) {
      _missedFinish = 0;
      const done  = data.progress.toLocaleString();
      const total = data.total > 0 ? ` / ${data.total.toLocaleString()}` : "";
      showBanner(`⟳ ${t().scanning} ${done}${total}`);
      loadStats();
      return true;
    } else {
      // Erst nach 2 aufeinanderfolgenden "not running" wirklich stoppen
      // (schützt gegen kurze Lücken beim Thread-Start)
      _missedFinish++;
      if (_missedFinish >= 2) {
        clearInterval(scanPoller);
        scanPoller = null;
        hideBanner();
        loadStats();
        loadGenres();
        loadTracks(1);
      }
      return false;
    }
  } catch (e) {
    // Netzwerkfehler → einfach weiterpollen
    return true;
  }
}

function startScanPolling() {
  if (scanPoller) clearInterval(scanPoller);
  _missedFinish = 0;
  checkScanOnce();
  scanPoller = setInterval(checkScanOnce, 3000);
}

// Stats alle 60 Sek. im Hintergrund aktualisieren
setInterval(loadStats, 60000);

// ── Init ───────────────────────────────────────────────────
(async () => {
  applyLang();
  await Promise.all([loadStats(), loadGenres(), loadTracks(1), lfmInit()]);

  const res  = await fetch(`${API}/api/scan/status`);
  const data = await res.json();
  if (data.running) {
    showBanner(t().scanning);
    startScanPolling();
  }
})();
</script>
</body>
</html>
