<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adolar</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent:        #7F77DD;
      --accent-light:  #EEEDFE;
      --accent-border: #AFA9EC;
      --accent-dark:   #3C3489;
      --accent-deep:   #534AB7;

      --bg-primary:    #30302E;
      --bg-secondary:  #3A3A38;
      --bg-tertiary:   #1E1E1C;

      --text-primary:   #ECECEC;
      --text-secondary: #9A9A96;
      --text-tertiary:  #5C5C58;

      --border-subtle: #3E3E3C;
      --border-medium: #505050;

      --text-xs:   11px;
      --text-sm:   12px;
      --text-base: 13px;
      --text-md:   14px;
      --text-lg:   15px;

      --topbar-h:  52px;
      --sidebar-w: 220px;
      --player-h:  60px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Zentrierung + max-width */
    #topbar, #scan-banner, #body-row, #player-bar {
      width: 100%;
      max-width: 1200px;
    }
    #topbar, #scan-banner, #player-bar {
      align-self: center;
    }

    /* ── Topbar ─────────────────────────────────────────── */
    #topbar {
      height: var(--topbar-h);
      min-height: var(--topbar-h);
      background: var(--bg-primary);
      border-bottom: 0.5px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 10;
    }
    #topbar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-primary);
    }
    #topbar-logo img { border-radius: 4px; }
    #btn-about {
      background: none; border: none; cursor: pointer;
      color: var(--text-tertiary); font-size: 13px; font-weight: 700;
      width: 18px; height: 18px; border-radius: 50%;
      border: 1.5px solid var(--text-tertiary);
      display: flex; align-items: center; justify-content: center;
      padding: 0; line-height: 1; margin-left: 4px; flex-shrink: 0;
      opacity: 0.5; transition: opacity .15s;
    }
    #btn-about:hover { opacity: 1; }
    #topbar-logo span {
      font-family: "Orbitron", sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, var(--accent) 0%, #b8b4f0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #topbar-meta {
      font-size: var(--text-sm);
      color: var(--text-tertiary);
    }

    /* ── Scan Banner ────────────────────────────────────── */
    #scan-banner {
      display: none;
      background: color-mix(in srgb, var(--accent) 15%, var(--bg-primary));
      border-bottom: 0.5px solid color-mix(in srgb, var(--accent) 40%, var(--border-subtle));
      padding: 7px 20px;
      font-size: var(--text-sm);
      color: var(--text-primary);
      align-items: center;
      gap: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes discoPulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.5; }
    }
    #scan-spinner { display: inline-block; animation: spin 1.2s linear infinite; }

    /* ── Body row (sidebar + content) ───────────────────── */
    #body-row {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      flex: 0 0 var(--sidebar-w);
      background: var(--bg-primary);
      border-right: 0.5px solid var(--border-subtle);
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-sizing: border-box;
    }

    /* Slider-Zeile darf nicht über Sidebar-Breite hinausgehen */
    .slider-item {
      max-width: 100%;
    }
    .slider-item input[type=range] {
      min-width: 0;
    }
    .slider-val {
      flex-shrink: 0;
    }

    .filter-section {}
    .filter-label {
      display: block;
      font-size: var(--text-xs);
      font-weight: 500;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .chip-group {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      width: 100%;
    }
    .chip {
      font-size: var(--text-sm);
      padding: 3px 9px;
      border-radius: 99px;
      border: 0.5px solid var(--border-subtle);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background .1s, border-color .1s, color .1s;
      white-space: nowrap;
      min-width: 0;
    }
    .chip:hover { background: var(--bg-secondary); }
    .chip.active {
      background: var(--accent-light);
      border-color: var(--accent-border);
      color: var(--accent-dark);
    }

    /* Range sliders in sidebar */
    .slider-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 2px;
    }
    .slider-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .slider-item label {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      width: 28px;
      flex-shrink: 0;
    }
    .slider-item input[type=range] {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .slider-val {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      width: 38px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Playlists sidebar ────────────────────────────── */
    #playlist-section {
      border-top: 0.5px solid var(--border-subtle);
      padding-top: 14px;
    }
    #playlist-section .filter-label { margin-bottom: 6px; }
    .pl-item {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 8px; border-radius: 6px; cursor: pointer;
      font-size: var(--text-sm); color: var(--text-secondary);
      transition: background .1s, color .1s;
    }
    .pl-item:hover { background: var(--bg-secondary); color: var(--text-primary); }
    .pl-item.active { background: color-mix(in srgb, var(--accent) 15%, var(--bg-secondary)); color: var(--accent); }
    .pl-item i { font-size: 13px; flex-shrink: 0; }
    .pl-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pl-del { opacity: 0; background: none; border: none; color: var(--text-tertiary);
              cursor: pointer; padding: 2px 4px; font-size: 12px; flex-shrink: 0; }
    .pl-item:hover .pl-del { opacity: 1; }
    .pl-del:hover { color: #e03e3e; }
    #btn-save-playlist {
      display: none; width: 100%; margin-top: 8px; padding: 6px 10px;
      background: none; border: 0.5px dashed var(--border-medium);
      border-radius: 6px; color: var(--text-tertiary); font-size: var(--text-sm);
      cursor: pointer; transition: border-color .1s, color .1s;
      align-items: center; justify-content: center; gap: 6px;
    }
    #btn-save-playlist:hover { border-color: var(--accent-border); color: var(--accent); }

    .sidebar-scan {
      margin-top: auto;
      padding-top: 12px;
      border-top: 0.5px solid var(--border-subtle);
    }
    #btn-scan {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      padding: 6px 10px;
      background: transparent;
      border: 0.5px solid var(--border-medium);
      border-radius: 6px;
      font-size: var(--text-base);
      color: var(--text-secondary);
      cursor: pointer;
      transition: background .1s;
    }
    #btn-scan:hover { background: var(--bg-secondary); }
    #btn-bpm-tag, #btn-bpm-calc {
      display: flex; align-items: center; gap: 6px;
      width: 100%; padding: 6px 10px; margin-top: 6px;
      background: transparent; border: 0.5px solid var(--border-medium);
      border-radius: 6px; font-size: var(--text-base);
      color: var(--text-secondary); cursor: pointer; transition: background .1s;
    }
    #btn-bpm-tag:hover, #btn-bpm-calc:hover { background: var(--bg-secondary); }
    #btn-bpm-tag.running, #btn-bpm-calc.running { color: var(--accent); }
    .field-search-panel {
      display: none;
      margin-top: 6px;
    }
    .field-search-input {
      width: 100%;
      border: 0.5px solid var(--border-subtle);
      border-radius: 6px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: var(--text-base);
      padding: 6px 8px;
      outline: none;
    }
    .field-search-input::placeholder { color: var(--text-tertiary); }
    .field-search-input:focus { border-color: var(--accent-border); }
    /* ── User menu ────────────────────────────────────── */
    #user-menu-wrap { position: relative; flex-shrink: 0; }
    #btn-user-menu {
      background: none; border: 0.5px solid var(--border-medium);
      border-radius: 8px; color: var(--text-primary); cursor: pointer;
      display: flex; align-items: center; gap: 6px; padding: 5px 10px;
      font-size: 13px; transition: border-color .15s;
    }
    #btn-user-menu:hover { border-color: var(--accent-border); }
    #user-dropdown {
      display: none; position: absolute; right: 0; top: calc(100% + 6px);
      background: var(--bg-primary); border: 0.5px solid var(--border-medium);
      border-radius: 8px; min-width: 180px; z-index: 200;
      box-shadow: 0 4px 16px rgba(0,0,0,.4); overflow: hidden;
    }
    #user-dropdown.open { display: block; }
    .user-dd-item {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 14px; font-size: 13px; color: var(--text-secondary);
      cursor: pointer; border: none; background: none; width: 100%; text-align: left;
      transition: background .1s, color .1s;
    }
    .user-dd-item:hover { background: var(--bg-secondary); color: var(--text-primary); }
    .user-dd-sep { height: 0.5px; background: var(--border-subtle); margin: 4px 0; }
    .user-dd-item.danger:hover { color: #f28b8b; }

    #btn-loved-filter {
      display: none;
      width: 100%;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: transparent;
      border: 0.5px solid var(--border-medium);
      border-radius: 6px;
      font-size: var(--text-base);
      color: var(--text-secondary);
      cursor: pointer;
      transition: background .1s, color .1s, border-color .1s;
    }
    #btn-loved-filter:hover { background: var(--bg-secondary); }
    #btn-loved-filter.active {
      border-color: #e03e3e;
      color: #e03e3e;
      background: color-mix(in srgb, #e03e3e 12%, var(--bg-primary));
    }
    #btn-loved-filter.running { color: var(--accent); border-color: var(--accent-border); }

    /* ── Content area ─────────────────────────────────── */
    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Search Bar ───────────────────────────────────── */
    #search-bar {
      background: var(--bg-primary);
      border-bottom: 0.5px solid var(--border-subtle);
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .search-input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-subtle);
      border-radius: 8px;
      padding: 7px 12px;
    }
    .search-input-wrap i { font-size: 16px; color: var(--text-tertiary); transition: color .2s; }
    .search-input-wrap.searching { border-color: var(--accent-border); }
    .search-input-wrap.searching i { color: var(--accent); animation: spin 0.7s linear infinite; }
    #search {
      flex: 1;
      border: none;
      background: transparent;
      font-size: var(--text-md);
      color: var(--text-primary);
      outline: none;
    }
    #search::placeholder { color: var(--text-tertiary); }
    #sort-select {
      border: 0.5px solid var(--border-subtle);
      border-radius: 8px;
      background: var(--bg-primary);
      color: var(--text-secondary);
      font-size: var(--text-base);
      padding: 7px 10px;
      cursor: pointer;
      outline: none;
    }
    #btn-radio {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border: 0.5px solid var(--border-subtle);
      border-radius: 8px;
      background: transparent;
      color: var(--text-secondary);
      font-size: var(--text-base);
      cursor: pointer;
      white-space: nowrap;
      transition: background .1s, color .1s, border-color .1s;
    }
    #btn-radio:hover { background: var(--bg-secondary); }
    #btn-radio.active {
      background: color-mix(in srgb, var(--accent) 15%, var(--bg-primary));
      border-color: var(--accent);
      color: var(--accent);
    }
    /* Last.fm heart */
    .btn-love {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      font-size: 16px;
      padding: 4px;
      line-height: 1;
      transition: color .15s, transform .15s;
      flex-shrink: 0;
    }
    .btn-love:hover { color: #e03e3e; transform: scale(1.15); }
    .btn-love.loved { color: #e03e3e; }
    /* Bookmark button */
    .btn-bookmark {
      background: none; border: none; cursor: pointer;
      color: var(--text-tertiary); font-size: 16px; padding: 4px;
      line-height: 1; transition: color .15s, transform .15s;
      flex-shrink: 0; position: relative;
    }
    .btn-bookmark:hover { color: var(--accent); transform: scale(1.15); }
    .btn-bookmark.bookmarked { color: var(--accent); }
    /* Bookmark dropdown */
    .bm-dropdown {
      position: absolute; right: 0; top: calc(100% + 4px);
      background: #1e1e2e; border: 1px solid var(--border);
      border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.7);
      min-width: 200px; z-index: 1000; overflow: hidden;
    }
    .bm-dropdown-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; cursor: pointer;
      font-size: 13px; color: var(--text-secondary);
      transition: background .1s, color .1s; white-space: nowrap;
    }
    .bm-dropdown-item:hover { background: var(--bg-secondary); color: var(--text-primary); }
    .bm-dropdown-item i { font-size: 14px; flex-shrink: 0; }
    .bm-dropdown-sep { height: 1px; background: var(--border); margin: 4px 0; }
    #player-love {
      font-size: 20px;
      padding: 6px;
      flex-shrink: 0;
    }
    #lastfm-connect {
      background: none;
      border: 0.5px solid var(--border-subtle);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: var(--text-sm);
      padding: 5px 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #lastfm-connect:hover { background: var(--bg-secondary); }

    /* ── Results Header ───────────────────────────────── */
    #results-header {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 0.5px solid var(--border-subtle);
      background: var(--bg-primary);
    }
    #result-count {
      font-size: var(--text-base);
      color: var(--text-secondary);
    }
    #view-toggle {
      display: flex;
      border: 0.5px solid var(--border-subtle);
      border-radius: 6px;
      overflow: hidden;
    }
    .view-btn {
      padding: 5px 9px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      font-size: 16px;
      display: flex;
      align-items: center;
    }
    .view-btn.active {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    /* ── Track List ───────────────────────────────────── */
    #track-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 16px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      background: var(--bg-tertiary);
    }

    .track-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-primary);
      border: 0.5px solid var(--border-subtle);
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: border-color .12s;
    }
    .track-row:hover { border-color: var(--border-medium); }
    .track-row.active {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 18%, var(--bg-primary));
    }
    .track-row.active .track-title {
      color: var(--text-primary);
    }

    /* Cover */
    .track-cover {
      width: 42px;
      height: 42px;
      border-radius: 6px;
      flex-shrink: 0;
      object-fit: cover;
    }
    .track-cover-placeholder {
      width: 42px;
      height: 42px;
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }

    /* Track info */
    .track-info { flex: 1; min-width: 0; }
    .track-title {
      font-size: var(--text-md);
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-sub {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    /* Meta */
    .track-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }
    .format-badge {
      font-size: var(--text-xs);
      padding: 2px 7px;
      border-radius: 99px;
      background: var(--bg-secondary);
      color: var(--text-secondary);
    }
    .track-dur {
      font-size: var(--text-sm);
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
    }
    .track-bpm {
      font-size: var(--text-xs);
      color: var(--accent);
      opacity: 0.7;
      font-variant-numeric: tabular-nums;
    }
    .track-bpm::after { content: " BPM"; }

    /* Inline play button */
    .track-play-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 0.5px solid var(--border-medium);
      background: transparent;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .1s, color .1s;
      font-size: 14px;
    }
    .track-play-btn:hover {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }
    .track-row.active .track-play-btn {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Pagination ───────────────────────────────────── */
    #pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      background: var(--bg-primary);
      border-top: 0.5px solid var(--border-subtle);
    }
    .pg-btn {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-subtle);
      color: var(--text-secondary);
      padding: 5px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: var(--text-base);
    }
    .pg-btn:disabled { opacity: .35; cursor: default; }
    #pg-info { font-size: var(--text-sm); color: var(--text-tertiary); }

    /* ── Basket ───────────────────────────────────────── */
    #btn-basket {
      background: none;
      border: 0.5px solid var(--border-medium);
      border-radius: 8px;
      color: var(--text-secondary);
      padding: 6px 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }
    #btn-basket.open {
      border-color: var(--accent);
      color: var(--accent);
    }
    #basket-count {
      display: none;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      border-radius: 99px;
      min-width: 18px;
      height: 18px;
      line-height: 18px;
      text-align: center;
      padding: 0 5px;
    }
    #basket-panel {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: 320px;
      background: var(--bg-primary);
      border: 0.5px solid var(--border-medium);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
      z-index: 100;
      overflow: hidden;
      flex-direction: column;
    }
    #basket-panel.open { display: flex; }
    #basket-list {
      overflow-y: auto;
      max-height: 320px;
      padding: 6px 0;
    }
    .basket-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      font-size: 13px;
    }
    .basket-item:hover { background: var(--bg-secondary); }
    .basket-item-info { flex: 1; min-width: 0; }
    .basket-item-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-primary);

      font-size: var(--text-base);

      white-space: nowrap;
      overflow: hidden;

      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;

    #player-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;

    .ctrl-btn {

      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 4px;
      border-radius: 4px;
      color: var(--text-secondary);
      transition: color .1s;

    .ctrl-btn i { font-size: 18px; }

    #progress-wrap {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .time-label {
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    #progress {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
    }

    #volume-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    #volume-wrap i { font-size: 16px; color: var(--text-tertiary); }

    audio { display: none; }

    #btn-miniplayer {
      background: none;

      align-items: center;
      gap: 5px;
      flex-shrink: 0;

    .empty-state {

      align-items: center;

      color: var(--text-tertiary);
      font-size: var(--text-base);

// ── Helpers ───────────────────────────────────────────────
function fmt(sec) {
  if (!sec || isNaN(sec)) return "0:00";
  const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, "0")}`;
}

function esc(s) {
  return String(s ?? "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function initials(name) {
  if (!name) return "♪";
  return name.trim().split(/\s+/).slice(0,2).map(w => w[0].toUpperCase()).join("");
}

function artistColor(name) {
  let h = 0;
  for (const c of (name || "?")) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return `hsl(${h % 360}, 55%, 40%)`;
}

function makePlaceholder(track, size) {
  const div = document.createElement("div");
  div.className = "track-cover-placeholder";
  div.style.cssText = `width:${size}px;height:${size}px;background:${artistColor(track.artist)}`;
  div.textContent = initials(track.artist);
  return div;
}

function makeCover(track, size = 42) {
  if (!track.has_cover) return makePlaceholder(track, size);

  const img = document.createElement("img");
  img.className = "track-cover";
  img.decoding = "async";
  img.width = size; img.height = size;
  img.onerror = () => img.replaceWith(makePlaceholder(track, size));
  img.src = `${API}/api/cover/${track.cover_hash}`;
  return img;
}

function _setSearching(on) {
  const wrap = document.querySelector('.search-input-wrap');
  const icon = wrap?.querySelector('i');
  if (!wrap || !icon) return;
  if (on) {
    wrap.classList.add('searching');
    icon.className = 'ti ti-loader';
  } else {
    wrap.classList.remove('searching');
    icon.className = 'ti ti-search';
  }
}

async function loadTracks(page = 1, forceCount = false) {
  if (radio.active) return;
  updateSavePlaylistBtn();
  _setSearching(true);
  // Skip COUNT if we already have the total and are just paging
  const needCount = page === 1 || forceCount || state.total === 0;
  state.page = page;
  const p = new URLSearchParams({ page, per_page: 50, sort: state.sort });
  if (!needCount) p.set("count", "0");
  if (state.query)              p.set("q", state.query);
  if (state.filters.genre)      p.set("genre",   state.filters.genre);
  if (state.filters.decade)     p.set("decade",  state.filters.decade);
  if (state.filters.format)     p.set("format",  state.filters.format);
  if (state.filters.min_dur > 0)     p.set("min_dur",     state.filters.min_dur);
  if (state.filters.max_dur > 0)     p.set("max_dur",     state.filters.max_dur);
  if (state.filters.min_bitrate > 0) p.set("min_bitrate", state.filters.min_bitrate);
  if (state.filters.year_min > 0)    p.set("year_min",    state.filters.year_min);
  if (state.filters.year_max > 0)    p.set("year_max",    state.filters.year_max);
  if (state.filters.bpm_min > 0)     p.set("bpm_min",     state.filters.bpm_min);
  if (state.filters.bpm_max > 0)     p.set("bpm_max",     state.filters.bpm_max);
  if (state.filters.artist_query)    p.set("artist", state.filters.artist_query);
  if (state.filters.title_query)     p.set("title",  state.filters.title_query);
  if (state.filters.album_query)     p.set("album",  state.filters.album_query);
  if (state.filters.loved)           p.set("loved",  "1");

  let data;
  try {
    const res = await fetch(`${API}/api/search?${p}`);
    data = await res.json();
  } catch {
    data = { results: DEMO_TRACKS, total: DEMO_TRACKS.length, pages: 1 };
  }
  if (!data.results?.length && page === 1 && !state.query && !Object.values(state.filters).some(Boolean)) {
    data = { results: DEMO_TRACKS, total: DEMO_TRACKS.length, pages: 1 };
  }

  state.tracks = data.results;
  // Preserve cached total when not recounting
  if (needCount) {
    state.total = data.total;
    state.pages = data.pages;
  } else {
    // Recalculate pages from cached total
    state.pages = Math.max(1, Math.ceil(state.total / 50));
  }

  _setSearching(false);
  renderTracks();
  renderPagination();
  fetchMemberships(state.tracks);

  // Scroll to top of results
  document.getElementById('track-list')?.scrollTo({ top: 0, behavior: 'instant' });

  const q = state.query;
  $("result-count").textContent = q
    ? t().results_q(data.total, esc(q))
    : t().results(data.total);
}

// ── Scrolling tab title ────────────────────────────────────
let _titleTimer = null;

function startTitleScroll(text) {
  if (_titleTimer) { clearInterval(_titleTimer); _titleTimer = null; }
  if (!text) { document.title = "Adolar"; return; }

  const full   = `${text}   ·   `;  // separator between repetitions
  const STATIC = 5000;   // ms to hold before scrolling
  const STEP   = 150;    // ms per character step
  let pos = 0;
  let phase = "static"; // "static" | "scroll" | "pause"
  let elapsed = 0;

  document.title = text;

  _titleTimer = setInterval(() => {
    if (phase === "static") {
      elapsed += STEP;
      if (elapsed >= STATIC) { phase = "scroll"; elapsed = 0; pos = 0; }
    } else if (phase === "scroll") {
      pos = (pos + 1) % full.length;
      const display = (full + full).slice(pos, pos + text.length);
      document.title = display;
      if (pos === 0) { phase = "pause"; elapsed = 0; document.title = text; }
    } else {
      elapsed += STEP;
      if (elapsed >= STATIC) { phase = "scroll"; elapsed = 0; pos = 0; }
    }
  }, STEP);
}

// ── Radio functions ───────────────────────────────────────
async function loadRadioQueue(count, excludeIds = []) {
  const p = new URLSearchParams({ count });
  excludeIds.forEach(id => p.append("exclude", id));
  try {
    const res = await fetch(`${API}/api/random?${p}`);
    return await res.json();
  } catch { return []; }
}

async function startRadio() {
  radio.active = true;
  radio.queue  = [];
  radio.playedIds = [];
  $("btn-radio").classList.add("active");

  // Fetch 5 tracks first → play immediately, then fetch remaining in background
  const initial = await loadRadioQueue(5);
  if (!initial.length) { stopRadio(); return; }

  radio.queue   = initial;
  radio.session = (radio.session || 0) + 1; // session token prevents stale fills
  state.tracks  = [...radio.queue];
  $("result-count").textContent = t().radio_loading;
  playTrack(0);

  // Background fill to 25 — guarded by session token
  const mySession = radio.session;
  loadRadioQueue(20, initial.map(t => t.id)).then(more => {
    if (!radio.active || radio.session !== mySession) return;
    radio.queue.push(...more);
    state.tracks = [...radio.queue];
    $("result-count").textContent = t().radio_tracks(radio.queue.length);
    renderTracks();
  });
}

function stopRadio() {
  radio.active = false;
  radio.cfActive = false;
  clearTimeout(radio.cfTimer);
  audioB.pause(); audioB.removeAttribute("src"); audioB.load();
  $("btn-radio").classList.remove("active");
}

async function radioNext() {
  if (!radio.active || !radio.queue.length) return;

  // shift played track out
  const done = radio.queue.shift();
  radio.playedIds.push(done.id);

  // refill: when queue drops to 5, load 20 more
  if (radio.queue.length <= 5) {
    const fresh = await loadRadioQueue(20, radio.playedIds.slice(-100));
    radio.queue.push(...fresh);
    // trim playedIds to last 100 to avoid unbounded growth
    if (radio.playedIds.length > 100) radio.playedIds = radio.playedIds.slice(-100);
  }

  if (!radio.queue.length) { stopRadio(); return; }

  state.tracks = [...radio.queue];
  state.currentIdx = 0;
  state.currentTrack = radio.queue[0];
  renderTracks();
  $("result-count").textContent = `Radio – ${radio.queue.length} Tracks`;
}

function preloadNext(nextTrackId) {
  // Buffer the next track silently so it's ready when crossfade starts
  if (audioB.getAttribute("src")) return; // already preloading
  audioB.src = `${API}/api/stream/${nextTrackId}`;
  audioB.volume = 0;
  audioB.preload = "auto";
  audioB.load();
}

function startCrossfade() {
  if (radio.cfActive) return;
  // Wait until audioB has enough data to play without interruption
  if (audioB.readyState < 3) { // HAVE_FUTURE_DATA = 3
    audioB.addEventListener("canplay", startCrossfade, { once: true });
    return;
  }
  radio.cfActive = true;
  const vol = parseFloat($("volume").value) || 0.8;

  audioB.volume = 0;
  audioB.play().catch(() => {
    // Autoplay blocked or src invalid — fall back to direct next
    radio.cfActive = false;
    radioNext().then(() => { if (radio.queue.length) playTrack(0); });
  });

  const startTime = performance.now();
  const tick = () => {
    const elapsed = (performance.now() - startTime) / 1000;
    const t_out = Math.min(elapsed / CF_OUT, 1);
    const t_in  = Math.min(Math.max(elapsed - (CF_OUT - CF_IN), 0) / CF_IN, 1);
    // Equal-power curve: constant perceived loudness
    audio.volume  = vol * Math.cos(t_out * Math.PI / 2);
    audioB.volume = vol * Math.sin(t_in  * Math.PI / 2);

    if (elapsed < CF_OUT) {
      radio.cfTimer = setTimeout(tick, 50);
    } else {
      const nextSrc  = audioB.src;
      const nextTime = audioB.currentTime;
      audioB.pause(); audioB.removeAttribute("src"); audioB.load();
      radio.cfActive = false;
      radioNext().then(() => {
        if (!radio.queue.length) return;
        _scrobbled = false;
        updatePlayerUI(radio.queue[0]);
        audio.src = nextSrc;
        audio.currentTime = nextTime;
        audio.volume = vol;
        audio.play();
        renderTracks();
      });
    }
  };
  tick();
}

// ── Player events ─────────────────────────────────────────
playBtn.onclick = () => audio.paused ? audio.play() : audio.pause();

audio.onplay  = () => {
  playBtn.innerHTML = `<i class="ti ti-player-pause"></i>`;
  renderTracks();
};
audio.onpause = () => {
  playBtn.innerHTML = `<i class="ti ti-player-play"></i>`;
  renderTracks();
};
audio.onended = async () => {
  if (radio.active) {
    if (radio.cfActive) return; // crossfade already handles the transition
    await radioNext();
    if (radio.queue.length) playTrack(0);
  } else {
    const next = state.currentIdx + 1;
    if (next < state.tracks.length) playTrack(next);
  }
};

let _scrobbled = false;
let _playCounted = false;
audio.ontimeupdate = () => {
  if (!audio.duration) return;
  progress.value = (audio.currentTime / audio.duration) * 100;
  $("time-cur").textContent = fmt(audio.currentTime);
  $("time-dur").textContent = fmt(audio.duration);

  // Scrobble after 50% playback (and at least 30s played)
  if (!_scrobbled && audio.currentTime >= 30 && audio.currentTime / audio.duration >= 0.5) {
    _scrobbled = true;
    lfmScrobble(state.currentTrack);
  }

  // Increment play count tag at 90% played
  if (!_playCounted && audio.currentTime / audio.duration >= 0.9) {
    _playCounted = true;
    if (state.currentTrack) {
      fetch(`${API}/api/track/${state.currentTrack.id}/played`, { method: "POST" })
        .catch(() => {});
    }
  }

  if (radio.active) {
    const remaining = audio.duration - audio.currentTime;
    const next = radio.queue[1];
    if (next) {
      // Only crossfade if track is long enough (skip CF for short tracks)
      const trackDur = audio.duration || 0;
      const cfEnabled = trackDur > CF_OUT + 2; // need at least CF_OUT+2s
      if (!radio.cfActive && remaining <= CF_PRELOAD) preloadNext(next.id);
      if (!radio.cfActive && cfEnabled && remaining <= CF_OUT) startCrossfade();
    }
  }
};

progress.oninput = () => {
  if (audio.duration) audio.currentTime = (progress.value / 100) * audio.duration;
};
$("volume").oninput = e => {
  audio.volume = e.target.value;
  if (!audioB.paused) audioB.volume = e.target.value;
};
audio.volume = 0.8;

$("btn-prev").onclick = () => {
  if (radio.active) return;
  if (state.currentIdx > 0) playTrack(state.currentIdx - 1);
};
$("btn-next").onclick = () => {
  if (radio.active) {
    clearTimeout(radio.cfTimer);
    radio.cfActive = false;
    audioB.pause(); audioB.removeAttribute("src"); audioB.load();
    audio.volume = parseFloat($("volume").value) || 0.8;
    radioNext().then(() => {
      if (radio.queue.length) playTrack(0);
    });
    return;
  }
  const next = state.currentIdx + 1;
  if (next < state.tracks.length) playTrack(next);
};

$("btn-radio").onclick = () => {
  if (radio.active) {
    stopRadio();
    loadTracks(1);
  } else {
    startRadio();
  }
};

// ── Mini-Player Popup ─────────────────────────────────────
const miniCh = new BroadcastChannel("adolar-player");
let miniWin = null;

function miniIsOpen() {
  return miniWin && !miniWin.closed;
}

function broadcastTrack(t) {
  if (!miniIsOpen()) return;
  const key = t ? `${t.artist}||${t.title}` : null;
  const loved = key ? (lfm.lovedCache.get(key) || false) : false;
  miniCh.postMessage({ type: "track", track: t, playing: !audio.paused, loved, lfmConnected: lfm.connected });
}

function broadcastPlayState() {
  if (!miniIsOpen()) return;
  miniCh.postMessage({ type: "playstate", playing: !audio.paused });
}

function broadcastLoved(loved) {
  if (!miniIsOpen()) return;
  miniCh.postMessage({ type: "loved", loved });
}

function broadcastProgress() {
  if (!miniIsOpen() || !audio.duration) return;
  miniCh.postMessage({ type: "progress", pct: (audio.currentTime / audio.duration) * 100, cur: audio.currentTime, dur: audio.duration });
}

audio.addEventListener("play",  broadcastPlayState);
audio.addEventListener("pause", broadcastPlayState);
audio.addEventListener("timeupdate", broadcastProgress);

// Commands from popup
miniCh.onmessage = e => {
  const msg = e.data;
  if (msg.type === "hello") {
    // Popup just opened — send current state
    if (state.currentTrack) broadcastTrack(state.currentTrack);
    else miniCh.postMessage({ type: "playstate", playing: false });
    miniCh.postMessage({ type: "lfm", connected: lfm.connected });
    return;
  }
  if (msg.type === "popup-closed") { miniWin = null; return; }
  if (msg.type !== "cmd") return;
  if (msg.cmd === "toggle")  audio.paused ? audio.play() : audio.pause();
  if (msg.cmd === "next")    $("btn-next").click();
  if (msg.cmd === "prev")    $("btn-prev").click();
  if (msg.cmd === "love")    lfmToggleLove(state.currentTrack, $("player-love"));
  if (msg.cmd === "seek" && audio.duration) audio.currentTime = (msg.value / 100) * audio.duration;
};

$("btn-miniplayer").onclick = () => {
  if (miniIsOpen()) { miniWin.focus(); return; }
  miniWin = window.open("/miniplayer", "adolar-mini",
    "width=320,height=200,resizable=no,toolbar=no,menubar=no,location=no,status=no");
};

function updateMiniPlayer(t) {
  broadcastTrack(t);
}

async function lfmInit() {

function renderLfmStatus() {
  const el = $("lastfm-status");
  if (!el) return;
  if (lfm.connected) {
    el.innerHTML = `
      <img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/lastdotfm.svg"
           width="14" height="14" style="filter:invert(.5) sepia(1) saturate(3) hue-rotate(310deg);opacity:.8">
      <span>${esc(lfm.username)}</span>

    $("player-love").style.display = "";

  } else {

    $("btn-loved-filter").style.display = "none";
    state.filters.loved = false;

}

async function lfmDisconnect() {
  await fetch(`${API}/api/lastfm/disconnect`, { method: "POST" });
  lfm.connected = false; lfm.username = null;
  lfm.lovedCache.clear();
  state.filters.loved = false;
  miniCh.postMessage({ type: "lfm", connected: false, loved: false });
  renderLfmStatus();
  renderTracks();
}

async function lfmScrobble(track) {
  if (!lfm.connected || !track) return;
  fetch(`${API}/api/lastfm/scrobble`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ artist: track.artist, title: track.title }),
  }).catch(() => {});
}

async function lfmToggleLove(track, btn) {
  if (!lfm.connected || !track) return;
  const key    = `${track.artist}||${track.title}`;
  const isLoved = lfm.lovedCache.get(key) || false;
  const action  = isLoved ? "unlove" : "love";
  try {
    await fetch(`${API}/api/lastfm/love`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ artist: track.artist, title: track.title, action }),
    });
    lfm.lovedCache.set(key, !isLoved);
    applyLovedState(btn, !isLoved);
    broadcastLoved(!isLoved);
    // update all matching heart buttons in track list
    document.querySelectorAll(`.btn-love[data-key="${CSS.escape(key)}"]`).forEach(b => applyLovedState(b, !isLoved));
  } catch (e) { console.error("Last.fm love failed", e); }
}

function updateLovedFilterButton(running = false) {
  const btn = $("btn-loved-filter");
  if (!btn) return;
  btn.classList.toggle("active", state.filters.loved);
  btn.classList.toggle("running", running);
  btn.innerHTML = running
    ? `<i class="ti ti-loader"></i><span>${t().lfm_loved_sync}</span>`
    : `<i class="ti ${state.filters.loved ? "ti-heart-filled" : "ti-heart"}"></i><span>${t().lfm_loved_filter}</span>`;
}

async function startLovedSync(reloadWhenDone = false) {
  if (!lfm.connected) return;
  try {
    updateLovedFilterButton(true);
    await fetch(`${API}/api/lastfm/loved/sync`, { method: "POST" });
    updateLovedFilterButton(false);
    if (reloadWhenDone && state.filters.loved) loadTracks(1, true);
  } catch {
    updateLovedFilterButton(false);
  }
}

$("btn-loved-filter").onclick = async () => {
  if (!lfm.connected) return;
  state.filters.loved = !state.filters.loved;
  updateLovedFilterButton(false);
  if (state.filters.loved) startLovedSync(true);
  loadTracks(1, true);
};

function applyLovedState(btn, loved) {
  if (!btn) return;
  btn.classList.toggle("loved", loved);
  btn.title = loved ? t().lfm_unlove : t().lfm_love;
  btn.innerHTML = loved
    ? `<i class="ti ti-heart-filled"></i>`
    : `<i class="ti ti-heart"></i>`;
}

let scanPoller = null;
let _missedFinish = 0;

async function checkScanOnce() {
  try {
    const res  = await fetch(`${API}/api/scan/status`);
    const data = await res.json();
    if (data.running) {
      _missedFinish = 0;
      const done  = data.progress.toLocaleString();
      const total = data.total > 0 ? ` / ${data.total.toLocaleString()}` : "";
      showBanner(`⟳ ${t().scanning} ${done}${total}`);
      loadStats();
      return true;
    } else {
      // Erst nach 2 aufeinanderfolgenden "not running" wirklich stoppen
      // (schützt gegen kurze Lücken beim Thread-Start)
      _missedFinish++;
      if (_missedFinish >= 2) {
        clearInterval(scanPoller);
        scanPoller = null;
        hideBanner();
        loadStats();
        loadGenres();
        loadTracks(1);
      }
      return false;
    }
  } catch (e) {
    // Netzwerkfehler → einfach weiterpollen
    return true;
  }
}

function startScanPolling() {
  if (scanPoller) clearInterval(scanPoller);
  _missedFinish = 0;
  checkScanOnce();
  scanPoller = setInterval(checkScanOnce, 3000);
}

let _playlists = [];
let _activePl  = null;
let _trackMemberships = {}; // { track_id: [playlist_id, ...] }

// ── Bookmark helpers ──────────────────────────────────────
async function fetchMemberships(tracks) {
  if (!_me || !tracks.length) return;
  const ids = tracks.map(tr => tr.id).join(",");
  try {
    const r = await fetch(`/api/playlists/memberships?ids=${ids}`);
    const data = await r.json();
    _trackMemberships = data;
    // Update all bookmark buttons already in the DOM
    document.querySelectorAll(".btn-bookmark").forEach(btn => {
      _applyBookmarkState(btn, Number(btn.dataset.trackId));
    });
  } catch {}
}

function _applyBookmarkState(btn, trackId) {
  const plIds = _trackMemberships[trackId] || [];
  const bookmarked = plIds.length > 0;
  btn.classList.toggle("bookmarked", bookmarked);
  btn.innerHTML = bookmarked
    ? `<i class="ti ti-bookmark-filled"></i>`
    : `<i class="ti ti-bookmark"></i>`;
  // Tooltip: list playlist names
  if (bookmarked) {
    const names = plIds.map(id => {
      const pl = _playlists.find(p => p.id === id);
      return pl ? pl.name : "?";
    }).join(", ");
    btn.title = names;
  } else {
    btn.title = t().bm_add;
  }
}

let _bmDropdownOpen = null;
function _closeBookmarkDropdown() {
  if (_bmDropdownOpen) { _bmDropdownOpen.remove(); _bmDropdownOpen = null; }
}

function _openBookmarkDropdown(btn, trackId) {
  if (_bmDropdownOpen) { _closeBookmarkDropdown(); return; }
  const userPlaylists = _playlists.filter(p => !p.is_system && p.type !== "static_radio");

  const dd = document.createElement("div");
  dd.className = "bm-dropdown";
  _bmDropdownOpen = dd;

  // "Neue Playlist erstellen"
  const newItem = document.createElement("div");
  newItem.className = "bm-dropdown-item";
  newItem.innerHTML = `<i class="ti ti-plus"></i><span>${t().bm_new_playlist}</span>`;
  newItem.addEventListener("click", async e => {
    e.stopPropagation();
    _closeBookmarkDropdown();
    const name = prompt(t().bm_new_prompt);
    if (!name?.trim()) return;
    const r = await fetch("/api/playlists", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ name: name.trim(), type: "static" })
    });
    if (!r.ok) return;
    const pl = await r.json();
    await fetch(`/api/playlists/${pl.id}/tracks`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ track_id: trackId })
    });
    _trackMemberships[trackId] = [...(_trackMemberships[trackId] || []), pl.id];
    await loadPlaylists();
    document.querySelectorAll(`.btn-bookmark[data-track-id="${trackId}"]`).forEach(b => _applyBookmarkState(b, trackId));
  });
  dd.appendChild(newItem);

  if (userPlaylists.length) {
    const sep = document.createElement("div");
    sep.className = "bm-dropdown-sep";
    dd.appendChild(sep);

    userPlaylists.forEach(pl => {
      const alreadyIn = (_trackMemberships[trackId] || []).includes(pl.id);
      const item = document.createElement("div");
      item.className = "bm-dropdown-item";
      item.innerHTML = `<i class="ti ${alreadyIn ? "ti-check" : "ti-playlist"}"></i><span>${esc(pl.name)}</span>`;
      if (!alreadyIn) {
        item.addEventListener("click", async e => {
          e.stopPropagation();
          _closeBookmarkDropdown();
          await fetch(`/api/playlists/${pl.id}/tracks`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ track_id: trackId })
          });
          _trackMemberships[trackId] = [...(_trackMemberships[trackId] || []), pl.id];
          document.querySelectorAll(`.btn-bookmark[data-track-id="${trackId}"]`).forEach(b => _applyBookmarkState(b, trackId));
        });
      }
      dd.appendChild(item);
    });
  }

  btn.appendChild(dd);
  // Close on outside click
  setTimeout(() => document.addEventListener("click", _closeBookmarkDropdown, { once: true }), 0);
}

async function loadPlaylists() {
  try {
    const r = await fetch("/api/playlists");
    _playlists = await r.json();
  } catch { return; }
  renderPlaylistSidebar();
}

function renderPlaylistSidebar() {
  const sysList  = $("playlist-system");
  const userList = $("playlist-user");
  sysList.innerHTML = "";
  userList.innerHTML = "";

  _playlists.forEach(pl => {
    const icon = pl.is_system
      ? (SYSTEM_SORT_ICONS[pl.sort] || "ti-list")
      : "ti-playlist";
    const item = document.createElement("div");
    item.className = "pl-item" + (_activePl === pl.id ? " active" : "");
    item.dataset.id = pl.id;
    item.innerHTML = `
      <i class="ti ${icon}"></i>
      <span class="pl-item-name">${esc(pl.name)}</span>
      ${!pl.is_system ? `<button class="pl-del" title="Löschen" data-id="${pl.id}"><i class="ti ti-x"></i></button>` : ""}
    `;
    item.addEventListener("click", e => {
      if (e.target.closest(".pl-del")) return;
      if (_activePl === pl.id) { clearPlaylist(); loadTracks(1, true); return; }
      applyPlaylist(pl);
    });
    const delBtn = item.querySelector(".pl-del");
    if (delBtn) {
      delBtn.addEventListener("click", async e => {
        e.stopPropagation();
        if (!confirm(t().pl_delete_confirm(pl.name))) return;
        await fetch(`/api/playlists/${pl.id}`, {method: "DELETE"});
        if (_activePl === pl.id) clearPlaylist();
        await loadPlaylists();
      });
    }
    (pl.is_system ? sysList : userList).appendChild(item);
  });
}

async function applyPlaylist(pl) {
  _activePl = pl.id;
  renderPlaylistSidebar();

  // Static playlists: fetch tracks directly and display them
  if (pl.type === "static") {
    _setSearching(true);
    try {
      const r = await fetch(`/api/playlists/${pl.id}/tracks`);
      const tracks = await r.json();
      state.total = tracks.length;
      state.pages = 1;
      state.page  = 1;
      renderTracks(tracks);
      renderPagination();
      fetchMemberships(tracks);
    } catch {}
    _setSearching(false);
    return;
  }

  // System playlists: only set sort, clear all filters
  if (pl.is_system) {
    resetFilters();
    state.sort = pl.sort;
    $("sort-select").value = pl.sort;
  } else {
    // Smart user playlist: restore saved filter state
    let filters = {};
    try { filters = JSON.parse(pl.filters || "{}"); } catch {}
    resetFilters();
    state.sort = pl.sort || "artist";
    $("sort-select").value = state.sort;
    Object.assign(state.filters, filters);
    _restoreFilterUI(filters);
  }

  loadTracks(1, true);
}

function clearPlaylist() {
  _activePl = null;
  renderPlaylistSidebar();
}

function resetFilters() {
  state.query = "";
  $("search").value = "";
  state.filters = {
    genre: "", decade: "", format: "",
    min_dur: 0, max_dur: 0, min_bitrate: 0,
    year_min: 0, year_max: 0,
    bpm_min: 0, bpm_max: 0,
    artist_query: "", title_query: "", album_query: "",
    loved: false,
  };
}

function _restoreFilterUI(filters) {
  if (filters.artist_query) {
    $("artist-search-panel").style.display = "block";
    $("chip-artist-alle").classList.remove("active");
    $("artist-search").value = filters.artist_query;
  }
  if (filters.title_query) {
    $("title-search-panel").style.display = "block";
    $("chip-title-alle").classList.remove("active");
    $("title-search").value = filters.title_query;
  }
  if (filters.album_query) {
    $("album-search-panel").style.display = "block";
    $("chip-album-alle").classList.remove("active");
    $("album-search").value = filters.album_query;
  }
  // Sliders, chips etc. — reset to defaults visually (filters applied via state)
}

let _me = null;

async function loadMe() {
  try {
    const r = await fetch("/api/me");
    if (r.status === 401) { location.href = "/login"; return; }
    _me = await r.json();
  } catch { return; }

  $("user-menu-name").textContent = _me.username;

  if (_me.role === "admin") {
    $("btn-user-mgmt").style.display = "flex";
  }

  // Hide Last.fm for non-admin
  if (_me.role !== "admin") {
    const lfmEl = document.getElementById("lastfm-status");
    if (lfmEl) lfmEl.style.display = "none";
    const loveBtn = document.getElementById("player-love");
    if (loveBtn) loveBtn.style.display = "none";
    const lovedFilter = document.getElementById("btn-loved-filter");
    if (lovedFilter) lovedFilter.parentElement.style.display = "none";
  }

  // Show basket only if download is permitted
  if (_me.allow_download) {
    $("basket-outer").style.display = "block";
  }

  // Hide scan/BPM buttons for non-admins
  if (_me.role !== "admin") {
    const scanWrap = document.querySelector(".sidebar-scan");
    if (scanWrap) scanWrap.style.display = "none";
  }
}

async function refreshUserList() {
  const r = await fetch("/api/users");
  const users = await r.json();
  const list = $("usermgmt-list");
  list.innerHTML = "";
  users.forEach(u => {
    const row = document.createElement("div");
    row.style.cssText = "display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border-subtle)";
    const isMe = _me && u.id === _me.id;
    row.innerHTML = `
      <i class="ti ti-user" style="color:var(--text-tertiary);flex-shrink:0"></i>
      <span style="flex:1;font-size:13px;color:var(--text-primary)">${esc(u.username)}</span>
      <span style="font-size:11px;padding:2px 7px;border-radius:99px;background:${u.role==='admin'?'rgba(127,119,221,.2)':'var(--bg-secondary)'};color:${u.role==='admin'?'var(--accent)':'var(--text-tertiary)'}">${u.role}</span>
      <label title="Download erlaubt" style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-tertiary);cursor:pointer">
        <input type="checkbox" data-uid="${u.id}" class="dl-toggle" ${u.allow_download?'checked':''}>
        <i class="ti ti-download" style="font-size:12px"></i>
      </label>
      <button data-uid="${u.id}" class="pw-reset-btn" title="Passwort zurücksetzen"
              style="background:none;border:0.5px solid var(--border-subtle);border-radius:6px;color:var(--text-tertiary);cursor:pointer;padding:3px 7px;font-size:11px" ${isMe?'style="display:none"':''}>
        <i class="ti ti-lock-open"></i>
      </button>
      ${isMe ? '' : `<button data-uid="${u.id}" class="del-user-btn" title="Löschen"
              style="background:none;border:0.5px solid var(--border-subtle);border-radius:6px;color:#e03e3e;cursor:pointer;padding:3px 7px;font-size:11px">
        <i class="ti ti-trash"></i>
      </button>`}
    `;
    list.appendChild(row);
  });

  // Download toggle
  list.querySelectorAll(".dl-toggle").forEach(cb => {
    cb.onchange = async () => {
      await fetch(`/api/users/${cb.dataset.uid}/download`, {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({allow: cb.checked})
      });
      if (_me && cb.dataset.uid == _me.id) _me.allow_download = cb.checked;
    };
  });

  // Password reset
  list.querySelectorAll(".pw-reset-btn").forEach(btn => {
    btn.onclick = async () => {
      const pw = prompt("Neues Initialpasswort (mind. 8 Zeichen):");
      if (!pw) return;
      const r = await fetch(`/api/users/${btn.dataset.uid}/password`, {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({password: pw})
      });
      const d = await r.json();
      if (d.error) alert(d.error);
      else alert("Passwort gesetzt. Benutzer muss es bei nächster Anmeldung ändern.");
    };
  });

  // Delete user
  list.querySelectorAll(".del-user-btn").forEach(btn => {
    btn.onclick = async () => {
      if (!confirm(t().user_delete_confirm)) return;
      await fetch(`/api/users/${btn.dataset.uid}`, {method: "DELETE"});
      await refreshUserList();
    };
  });
}

async function refreshBlockedIps() {
  const r = await fetch("/api/admin/blocked-ips");
  const ips = await r.json();
  const wrap = $("usermgmt-blocks-wrap");
  const el   = $("usermgmt-blocks");
  if (!ips.length) { wrap.style.display = "none"; return; }
  wrap.style.display = "block";
  el.innerHTML = "";
  ips.forEach(item => {
    const isPerm = item.blocked_until > 9999999999;
    const rem = isPerm ? null : Math.ceil((item.blocked_until - Date.now()/1000) / 60);
    const row = document.createElement("div");
    row.style.cssText = "display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;color:var(--text-secondary)";
    row.innerHTML = `
      <i class="ti ti-ban" style="color:#e03e3e;font-size:12px"></i>
      <span style="flex:1">${esc(item.ip)}</span>
      <span style="color:#e03e3e;font-weight:600">${isPerm ? 'Permanent gesperrt' : `noch ~${rem} Min.`}</span>
      <button data-ip="${esc(item.ip)}" class="unblock-btn"
              style="background:none;border:0.5px solid var(--border-subtle);border-radius:5px;color:var(--accent);cursor:pointer;padding:2px 7px;font-size:11px">
        Entsperren
      </button>
    `;
    el.appendChild(row);
  });
  el.querySelectorAll(".unblock-btn").forEach(btn => {
    btn.onclick = async () => {
      await fetch(`/api/admin/blocked-ips/${encodeURIComponent(btn.dataset.ip)}`, {method: "DELETE"});
      await refreshBlockedIps();
    };
  });
}

async function addUser() {
  const errEl = $("usermgmt-error");
  errEl.style.display = "none";
  const username = $("new-user-name").value.trim();
  const password = $("new-user-pw").value;
  const r = await fetch("/api/users", {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({username, password})
  });
  const d = await r.json();
  if (d.error) {
    errEl.textContent = d.error;
    errEl.style.display = "block";
  } else {
    $("new-user-name").value = "";
    $("new-user-pw").value = "";
    await refreshUserList();
  }
}
