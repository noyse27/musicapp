<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adolar – Einrichtung</title>
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #7F77DD; --accent-border: #AFA9EC; --accent-dark: #3C3489;
      --bg-primary: #30302E; --bg-secondary: #3A3A38; --bg-tertiary: #1E1E1C;
      --text-primary: #ECECEC; --text-secondary: #9A9A96; --text-tertiary: #5C5C58;
      --border-subtle: #3E3E3C;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-tertiary); color: var(--text-primary);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: var(--bg-primary); border: 0.5px solid var(--border-subtle);
      border-radius: 12px; padding: 40px; width: 360px;
    }
    .logo {
      font-family: "Orbitron", sans-serif; font-size: 22px; font-weight: 700;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, var(--accent) 0%, #b8b4f0 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 8px;
    }
    .subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 28px; }
    label { display: block; font-size: 12px; color: var(--text-tertiary); margin-bottom: 5px; margin-top: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
    input[type=text], input[type=password] {
      width: 100%; padding: 9px 12px; background: var(--bg-secondary);
      border: 0.5px solid var(--border-subtle); border-radius: 8px;
      color: var(--text-primary); font-size: 14px; outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--accent-border); }
    .hint { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }
    .btn {
      margin-top: 24px; width: 100%; padding: 10px; background: var(--accent);
      border: none; border-radius: 8px; color: #fff; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    .btn:hover { opacity: 0.85; }
    .error {
      margin-top: 14px; padding: 10px 12px; background: color-mix(in srgb, #e03e3e 15%, var(--bg-secondary));
      border: 0.5px solid #e03e3e; border-radius: 8px; font-size: 13px; color: #f28b8b;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">ADOLAR</div>
    <div class="subtitle">Erste Einrichtung — Admin-Konto anlegen</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" autocomplete="off">
      <label for="username">Benutzername</label>
      <input id="username" name="username" type="text" required autofocus
             value="{{ username|default('') }}" autocomplete="username">

      <label for="password">Passwort</label>
      <input id="password" name="password" type="password" required autocomplete="new-password">
      <div class="hint">Mindestens 8 Zeichen</div>

      <label for="password2">Passwort wiederholen</label>
      <input id="password2" name="password2" type="password" required autocomplete="new-password">

      <button class="btn" type="submit">Admin anlegen &amp; starten</button>
    </form>
  </div>
</body>
</html>
